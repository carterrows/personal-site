services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-site
    restart: unless-stopped
    init: true
    read_only: true
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=16m,mode=1777
    ports:
      - "127.0.0.1:4321:4321"
